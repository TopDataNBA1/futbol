<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOP DATA FUTBOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12151C;
    --surface:#1A1F2A;
    --surface-2:#232937;
    --row-a:#0B0D12;
    --row-b:#1C2129;
    --border:#232B3A;
    --gold:#D8A73D;
    --gold-dim:#8A6B2A;
    --live:#33D6A6;
    --text:#EDEFF3;
    --text-dim:#8A93A6;
    --text-faint:#5B6478;
    --radius:10px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  a{color:inherit;}

  /* ---------- HEADER ---------- */
  header{
    position:sticky; top:0; z-index:50;
    background:rgba(10,13,18,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .header-inner{
    max-width:1180px; margin:0 auto; padding:20px 20px 14px;
    display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center;
  }
  .brand-title{
    font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase;
    font-size:32px; letter-spacing:0.06em;
    background:linear-gradient(180deg, #FFFFFF 0%, #C7CDD9 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 2px 18px rgba(216,167,61,0.15);
  }
  .brand-title span{
    background:linear-gradient(180deg, #F0C158 0%, var(--gold) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand-tag{font-size:12px; color:var(--text-dim); letter-spacing:0.1em;}
  .status{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--text-faint); margin-top:2px;}
  .live-dot{
    width:7px; height:7px; border-radius:50%; background:var(--live);
    box-shadow:0 0 0 0 rgba(51,214,166,0.6);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(51,214,166,0.55);}
    70%{box-shadow:0 0 0 8px rgba(51,214,166,0);}
    100%{box-shadow:0 0 0 0 rgba(51,214,166,0);}
  }
  .live-label{color:var(--live); font-weight:600; letter-spacing:0.08em; font-size:11px;}

  /* ---------- TABS ---------- */
  .tabs{
    max-width:1180px; margin:22px auto 0; padding:0 20px;
    display:flex; gap:8px;
  }
  .tab-btn{
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.06em;
    font-size:13px; font-weight:500;
    background:transparent; border:1px solid var(--border); color:var(--text-dim);
    padding:10px 18px; border-radius:999px; cursor:pointer;
    transition:all .15s ease;
  }
  .tab-btn:hover{color:var(--text); border-color:var(--text-faint);}
  .tab-btn.active{
    background:var(--gold); color:#161207; border-color:var(--gold); font-weight:600;
  }

  main{max-width:1180px; margin:0 auto; padding:22px 20px 80px;}
  .view{display:none;}
  .view.active{display:block;}

  /* ---------- RECENT MOVES ---------- */
  .moves-list{display:flex; flex-direction:column; gap:16px;}
  .move-card{
    display:flex; flex-direction:column;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden;
    animation:fadein .4s ease;
  }
  @keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}
  .move-collage{
    position:relative; width:100%; padding-top:66.666%; /* proporcio 3:2, sempre fiable */
    background:var(--surface-2);
    border-bottom:3px solid var(--gold);
    overflow:hidden;
  }
  .move-collage img{
    position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; display:block;
  }
  .move-collage.empty::after{
    content:'⚽'; font-size:32px; opacity:.35;
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  }
  .move-body{padding:14px 16px;}
  .move-text{font-size:14.5px; line-height:1.6; color:var(--text);}
  .move-text b{color:var(--gold); font-weight:600;}
  .move-text .flag-img{margin:0 1px;}
  .player-mention{white-space:nowrap;}
  .move-meta-inline{color:var(--text-faint); font-size:12px; white-space:nowrap;}
  .move-share-btn{
    display:inline-flex; align-items:center; justify-content:center;
    background:none; border:none; color:var(--text-faint); cursor:pointer;
    padding:0 2px; vertical-align:middle; transition:color .15s ease;
  }
  .move-share-btn:hover{color:var(--gold);}
  .empty-state{
    text-align:center; padding:60px 20px; color:var(--text-dim);
  }
  .empty-state .big{font-size:15px; margin-bottom:6px; color:var(--text);}
  .empty-state .small{font-size:12.5px; color:var(--text-faint);}

  /* ---------- FILTER BAR ---------- */
  .filter-bar{
    display:flex; flex-wrap:wrap; gap:22px; align-items:flex-end;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px 18px; margin-bottom:18px;
  }
  .filter-group{display:flex; flex-direction:column; gap:7px;}
  .filter-group label{
    font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint);
    font-weight:600;
  }
  .segmented{display:flex; background:var(--surface-2); border-radius:8px; padding:3px; gap:2px;}
  .segmented button{
    font-family:'Inter',sans-serif; font-size:12.5px; font-weight:500;
    background:transparent; border:none; color:var(--text-dim);
    padding:7px 13px; border-radius:6px; cursor:pointer; transition:all .15s ease;
  }
  .segmented button.active{background:var(--gold); color:#161207; font-weight:600;}
  .segmented button:hover:not(.active){color:var(--text);}

  /* ---------- RANK CELLS ---------- */
  .rank-cell{font-family:'Oswald',sans-serif; font-weight:600; font-size:10.5px; color:var(--text); white-space:nowrap;}
  .rank-cell.global{color:var(--gold); font-weight:700; font-size:12px;}
  .rank-cell .conf-label{color:var(--text-dim); font-weight:500; font-size:9px; margin-left:2px;}

  /* ---------- TABLE ---------- */
  .table-wrap{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    overflow:auto;
  }
  table{width:100%; border-collapse:collapse; font-size:10px; min-width:0; table-layout:fixed;}
  thead th{
    position:sticky; top:0; background:var(--surface-2);
    text-align:right; padding:5px 3px; font-size:8px; letter-spacing:0.02em;
    text-transform:uppercase; color:var(--text-faint); font-weight:600;
    border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  tbody td{
    padding:4px 3px; border-bottom:1px solid var(--border); vertical-align:middle;
    white-space:nowrap; text-align:right; overflow:hidden; text-overflow:ellipsis;
  }
  thead th:nth-child(2), tbody td:nth-child(2){
    text-align:left; white-space:normal; line-height:1.15;
  }
  thead th:nth-child(3), tbody td:nth-child(3),
  thead th:nth-child(4), tbody td:nth-child(4){
    text-align:left;
  }
  thead th:nth-child(1), tbody td:nth-child(1){width:11%;}
  thead th:nth-child(2), tbody td:nth-child(2){width:17%;}
  thead th:nth-child(3), tbody td:nth-child(3){width:16%;}
  thead th:nth-child(4), tbody td:nth-child(4){width:25%;}
  thead th:nth-child(5), tbody td:nth-child(5){width:11%;}
  thead th:nth-child(6), tbody td:nth-child(6){width:10%;}
  thead th:nth-child(7), tbody td:nth-child(7){width:10%;}
  tbody tr.row-a{background:var(--row-a);}
  tbody tr.row-b{background:var(--row-b);}
  tbody tr:hover{background:var(--surface-2) !important;}
  tbody tr:last-child td{border-bottom:none;}
  .player-name{font-weight:600; color:var(--text); font-size:11.5px;}
  .stat-main{font-family:'Oswald',sans-serif; font-weight:600; font-size:12.5px; color:var(--gold);}
  .dim{color:var(--text-dim); font-family:'IBM Plex Mono',monospace; font-size:10px;}
  .badge-active{
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background:var(--live); margin-left:4px; vertical-align:middle;
  }
  .flag-img{vertical-align:middle; border-radius:2px; margin-right:2px; width:14px; height:11px;}

  footer{
    text-align:center; padding:30px 20px 50px; color:var(--text-faint); font-size:11.5px;
  }

  .flag-missing{opacity:.4; font-size:11px;}

  @media (max-width:640px){
    .brand-title{font-size:24px;}
    .move-collage{padding-top:75%;}
    .filter-bar{gap:14px; padding:14px;}

    /* Sacrifiquem les 2 ultimes columnes (Debut/Latest o Career Span/Date)
       i donem el seu espai al nom del jugador, que quedava massa retallat */
    thead th:nth-child(6), tbody td:nth-child(6),
    thead th:nth-child(7), tbody td:nth-child(7){
      display:none;
    }
    thead th:nth-child(4), tbody td:nth-child(4){width:44%;}
    thead th:nth-child(1), tbody td:nth-child(1){width:14%;}
    thead th:nth-child(2), tbody td:nth-child(2){width:22%;}
    thead th:nth-child(3), tbody td:nth-child(3){width:20%;}
    thead th:nth-child(5), tbody td:nth-child(5){width:14%;}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1 class="brand-title">TOP DATA <span>FUTBOL</span></h1>

<main>

      </div>

  </section>

  <!-- ================= LIVE RANKINGS ================= -->

    <div class="filter-bar">
      <div class="filter-group">
        <label>Sorted by</label>
        <div class="segmented" id="filter-sort">
          <button class="active" data-value="Partits">Caps</button>
          <button data-value="Gols">Goals</button>
        </div>
      </div>
      <div class="filter-group">
        <label>Show</label>
        <div class="segmented" id="filter-show">
          <button class="active" data-value="all">All</button>
          <button data-value="active">Active</button>
        </div>
      </div>
      <div class="filter-group">
        <label>Ranking</label>
        <div class="segmented" id="filter-top">
          <button class="active" data-value="0">All</button>
          <button data-value="10">Top 10</button>
          <button data-value="25">Top 25</button>
          <button data-value="100">Top 100</button>
        </div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr id="table-head"></tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="7" style="padding:40px; text-align:center; color:var(--text-dim);">⏳ Loading rankings…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

<footer>Data sourced from Wikipedia · Updated automatically from live match monitoring</footer>

function _normalitzarPais(s){
  return (s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim().toLowerCase();
}
const FLAGS_NORM = {};
for(const [k, v] of Object.entries(FLAGS)){ FLAGS_NORM[_normalitzarPais(k)] = v; }
const FIFA_CODES_NORM = {};
for(const [k, v] of Object.entries(FIFA_CODES)){ FIFA_CODES_NORM[_normalitzarPais(k)] = v; }

function flagImg(pais){
  const code = FLAGS[pais] || FLAGS_NORM[_normalitzarPais(pais)];
  if(!code) return `<span class="flag-missing" title="${pais}">🏳️</span>`;
  return `<img class="flag-img" src="https://flagcdn.com/20x15/${code.toLowerCase()}.png" alt="" width="20" height="15">`;
}

function fifaCode(pais){
  return FIFA_CODES[pais] || FIFA_CODES_NORM[_normalitzarPais(pais)] || (pais || '').slice(0,3).toUpperCase();
}

function ordinal(n){
  n = parseInt(n,10);
  const mod100 = n % 100;
  if(mod100 >= 10 && mod100 <= 20) return n + "th";
  switch(n % 10){
    case 1: return n + "st";
    case 2: return n + "nd";
    case 3: return n + "rd";
    default: return n + "th";
  }
}

    const [baselineResp, dataResp] = await Promise.all([
      fetch('baseline.json').then(r => r.ok ? r.json() : {Partits:{},Gols:{}}).catch(() => ({Partits:{},Gols:{}})),
      fetch('data.json').then(r => r.ok ? r.json() : {notificacions:[],baseline:{Partits:{},Gols:{}}}).catch(() => ({notificacions:[],baseline:{Partits:{},Gols:{}}})),
    ]);
    BASELINE = baselineResp;
    DATA = dataResp;
  }catch(e){
    console.error("Error loading data", e);
  }
  mergeData();
  renderMoves();
  renderRankingsHead();
  renderRankingsBody();
  updateTimestamp();
}

function mergeData(){
  for(const cat of ["Partits","Gols"]){
    const base = BASELINE[cat] || {};
    const viu = (DATA.baseline && DATA.baseline[cat]) || {};
    const noms = new Set([...Object.keys(base), ...Object.keys(viu)]);
    const llista = [];
    for(const nom of noms){
      const d = { ...(base[nom] || {}), ...(viu[nom] || {}) };
      d.nom = nom;
      llista.push(d);
    }
    llista.sort((a,b) => (b.valor||0) - (a.valor||0));
    MERGED[cat] = llista;
  }
}

function computeRanks(cat){
  const llista = MERGED[cat];
  const global = {}, conf = {}, pais = {};
  let rankGlobal = 0, lastValGlobal = null;

  llista.forEach((j, i) => {
    if(j.valor !== lastValGlobal){ rankGlobal = i + 1; lastValGlobal = j.valor; }
    global[j.nom] = rankGlobal;
  });

  const perConf = {};
  llista.forEach(j => { (perConf[j.confederacio] = perConf[j.confederacio] || []).push(j); });
  for(const c in perConf){
    let r = 0, last = null;
    perConf[c].forEach((j,i) => { if(j.valor !== last){ r = i+1; last = j.valor; } conf[j.nom] = r; });
  }

  const perPais = {};
  llista.forEach(j => { (perPais[j.pais] = perPais[j.pais] || []).push(j); });
  for(const p in perPais){
    let r = 0, last = null;
    perPais[p].forEach((j,i) => { if(j.valor !== last){ r = i+1; last = j.valor; } pais[j.nom] = r; });
  }

  return { global, conf, pais };
}

/* ---------------- RECENT MOVES ---------------- */

function tempsRelatiu(ts){
  if(!ts) return '';
  const ara = Date.now() / 1000;
  const dif = Math.max(0, ara - ts);
  if(dif < 60) return 'just now';
  if(dif < 3600) return Math.floor(dif / 60) + 'm ago';
  if(dif < 86400) return Math.floor(dif / 3600) + 'h ago';
  return Math.floor(dif / 86400) + 'd ago';
}

function _fmtJugadorsHTML(jugadors, ambBanderes){
  const parts = jugadors.map(j => {
    const contingut = ambBanderes ? `${j.nom} ${flagImg(j.pais)}` : j.nom;
    return `<span class="player-mention">${contingut}</span>`;
  });
  if(parts.length === 0) return '';
  if(parts.length === 1) return parts[0];
  return parts.slice(0, -1).join(', ') + ' and ' + parts[parts.length - 1];
}

function renderNotifRichHTML(d){
  const paraula = d.categoria === 'Gols' ? 'scorer' : 'player';
  const tipus = d.categoria === 'Gols' ? 'goal' : 'cap';
  const sufixValor = `with ${d.valor} international ${tipus}s.`;
  // el protagonista NOMES porta bandera al costat del seu rang (Xth <bandera>),
  // mai repetida al costat del seu propi nom
  const jugadorTxt = `<b>${d.jugador}</b>`;
  const paisRank = `<span class="player-mention">${ordinal(d.rank_nacional)} ${flagImg(d.pais)}</span>`;

  if(!d.accions || d.accions.length === 0){
    return `${ordinal(d.valor)} international ${tipus} for ${jugadorTxt}. `
         + `${paisRank}, ${ordinal(d.rank_confederacio)} ${d.confederacio}, `
         + `${ordinal(d.rank_global)} global ${paraula}.`;
  }

  // si tots son compatriotes del protagonista, la bandera de cadascun seria
  // identica a la del rang -> redundant, no la repetim al costat de cada nom
  const ambBanderesPerNom = d.ambit !== 'compatriota';
  const accioTxt = d.accions.map(a => `${a.verb} ${_fmtJugadorsHTML(a.jugadors, ambBanderesPerNom)}`).join(' and ');

  if(d.ambit === 'compatriota'){
    const ranksTxt = `${paisRank}, ${ordinal(d.rank_confederacio)} ${d.confederacio}, ${ordinal(d.rank_global)} global`;
    return `${jugadorTxt} ${accioTxt} as ${ranksTxt} ${paraula} ${sufixValor}`;
  }else if(d.ambit === 'confederacio'){
    const prefix = `${jugadorTxt} (${paisRank})`;
    const ranksTxt = `${ordinal(d.rank_confederacio)} ${d.confederacio}, ${ordinal(d.rank_global)} global`;
    return `${prefix} ${accioTxt} as ${ranksTxt} ${paraula} ${sufixValor}`;
  }else{
    const prefix = `${jugadorTxt} (${paisRank}, ${ordinal(d.rank_confederacio)} ${d.confederacio})`;
    const ranksTxt = `${ordinal(d.rank_global)} global`;
    return `${prefix} ${accioTxt} as ${ranksTxt} ${paraula} ${sufixValor}`;
  }
}

function compartirNotificacio(text, btn){
  const url = window.location.href.split('#')[0];
  if(navigator.share){
    navigator.share({ text, url }).catch(() => {});
  }else if(navigator.clipboard){
    navigator.clipboard.writeText(`${text} ${url}`).then(() => {
      const original = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = original; }, 1500);
    });
  }
}
window.compartirNotificacio = compartirNotificacio;

function renderMoves(){
  const el = document.getElementById('moves-list');
  const notifs = [...(DATA.notificacions || [])].sort((a,b) => (b.ts||0) - (a.ts||0));
  if(notifs.length === 0){
    el.innerHTML = `<div class="empty-state">
      <div class="big">No moves yet</div>
      <div class="small">New caps, goals and records will appear here as matches are played.</div>
    </div>`;
    return;
  }
const ICONA_SHARE = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>';

  el.innerHTML = notifs.map((n, i) => {
    const textHtml = n.dades ? renderNotifRichHTML(n.dades) : (n.text || '');
    const collage = n.collage
      ? `<div class="move-collage"><img src="${n.collage}" loading="lazy" alt=""></div>`
      : `<div class="move-collage empty"></div>`;
    const textEscapat = (n.text || '').replace(/'/g, "\\'");
    return `<div class="move-card">
      ${collage}
      <div class="move-body">
        <div class="move-text">${textHtml} <span class="move-meta-inline">· ${tempsRelatiu(n.ts)}</span> <button class="move-share-btn" onclick="compartirNotificacio('${textEscapat}', this)" title="Share">${ICONA_SHARE}</button></div>
      </div>
    </div>`;
  }).join('');
}

/* ---------------- RANKINGS ---------------- */
let estatFiltres = { sort: 'Partits', show: 'all', top: 0 };

function renderRankingsHead(){
  const thead = document.getElementById('table-head');
  if(estatFiltres.sort === 'Partits'){
    thead.innerHTML = `<th>Global</th><th>Confed.</th><th>Country</th><th>Player</th><th>Caps</th><th>Debut</th><th>Latest</th>`;
  }else{
    thead.innerHTML = `<th>Global</th><th>Confed.</th><th>Country</th><th>Player</th><th>Goals</th><th>Career Span</th><th>Date of 50th Goal</th>`;
  }
}

function rankCellGlobal(nom, ranks){
  return `<span class="rank-cell global">${ordinal(ranks.global[nom])}</span>`;
}
function rankCellConf(nom, ranks, confederacio){
  return `<span class="rank-cell">${ordinal(ranks.conf[nom])} <span class="conf-label">${confederacio || ''}</span></span>`;
}
function rankCellCountry(nom, ranks, pais){
  return `<span class="rank-cell">${flagImg(pais)} ${ordinal(ranks.pais[nom])} <span class="conf-label">${fifaCode(pais)}</span></span>`;
}

function renderRankingsBody(){
  const tbody = document.getElementById('table-body');
  const cat = estatFiltres.sort;
  let llista = MERGED[cat];
  const ranks = computeRanks(cat);

  if(estatFiltres.show === 'active'){
    llista = llista.filter(j => j.actiu);
  }
  if(estatFiltres.top > 0){
    llista = llista.filter(j => ranks.global[j.nom] <= estatFiltres.top);
  }

  if(llista.length === 0){
    const cols = 7;
    tbody.innerHTML = `<tr><td colspan="${cols}" style="padding:40px; text-align:center; color:var(--text-dim);">No players match this filter.</td></tr>`;
    return;
  }

  let valorAnterior = null;
  let stripe = 'a';
  tbody.innerHTML = llista.map(j => {
    if(valorAnterior !== null && j.valor !== valorAnterior){
      stripe = (stripe === 'a') ? 'b' : 'a';
    }
    valorAnterior = j.valor;
    const rowClass = 'row-' + stripe;

    const activeDot = j.actiu ? '<span class="badge-active" title="Active"></span>' : '';
    const rGlobal = rankCellGlobal(j.nom, ranks);
    const rConf = rankCellConf(j.nom, ranks, j.confederacio);
    const rPais = rankCellCountry(j.nom, ranks, j.pais);
    if(cat === 'Partits'){
      return `<tr class="${rowClass}">
        <td>${rGlobal}</td>
        <td>${rConf}</td>
        <td>${rPais}</td>
        <td class="player-name">${j.alias || j.nom}${activeDot}</td>
        <td class="stat-main">${j.valor}</td>
        <td class="dim">${j.inici || '—'}</td>
        <td class="dim">${j.final || '—'}</td>
      </tr>`;
    }else{
      return `<tr class="${rowClass}">
        <td>${rGlobal}</td>
        <td>${rConf}</td>
        <td>${rPais}</td>
        <td class="player-name">${j.alias || j.nom}${activeDot}</td>
        <td class="stat-main">${j.valor}</td>
        <td class="dim">${(j.inici||'—')}–${(j.final||'—')}</td>
        <td class="dim">${j.data_50e_gol || '—'}</td>
      </tr>`;
    }
  }).join('');
}

function updateTimestamp(){
  const t = document.getElementById('last-updated');
  const now = new Date();
  t.textContent = 'Last update: ' + now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

/* ---------------- UI WIRING ---------------- */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + btn.dataset.view).classList.add('active');
  });
});

function wireSegmented(id, key, after){
  document.querySelectorAll(`#${id} button`).forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll(`#${id} button`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      estatFiltres[key] = key === 'top' ? parseInt(btn.dataset.value,10) : btn.dataset.value;
      after();
    });
  });
}
wireSegmented('filter-sort', 'sort', () => { renderRankingsHead(); renderRankingsBody(); });
wireSegmented('filter-show', 'show', renderRankingsBody);
wireSegmented('filter-top', 'top', renderRankingsBody);

loadData();
setInterval(loadData, 60000); // refresc automatic cada minut
</script>
